name: ayutam
description: Local-first skill practice tracker for Android, Windows, and Linux. No backend, no accounts.
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^3.3.2
  drift: ^2.32.0
  sqlite3: ^3.5.0
  sqlite3_flutter_libs: ^0.5.40
  path_provider: ^2.1.5
  path: ^1.9.1
  uuid: ^4.5.2
  intl: ^0.20.2
  meta: ^1.17.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  drift_dev: ^2.32.0
  build_runner: ^2.10.5

flutter:
  uses-material-design: true
