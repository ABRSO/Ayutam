version: 2
updates:
  # Dart / Flutter packages (pubspec.yaml + pubspec.lock)
  - package-ecosystem: pub
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5

  # Keep GitHub Actions versions current (checkout, flutter-action, etc.)
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
