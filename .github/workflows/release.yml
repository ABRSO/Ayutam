name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: read

env:
  FLUTTER_VERSION: "3.44.7"

jobs:
  # Tag must match pubspec.yaml version and have a CHANGELOG section.
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Check tag against pubspec and CHANGELOG
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "Releasing version: $VERSION"
          if ! grep -Eq "^version: ${VERSION}(\+[0-9]+)?$" pubspec.yaml; then
            echo "::error::pubspec.yaml version does not match tag v${VERSION}"
            exit 1
          fi
          if ! grep -q "## \[${VERSION}\]" CHANGELOG.md; then
            echo "::error::CHANGELOG.md has no '## [${VERSION}]' section"
            exit 1
          fi

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true
      - run: flutter pub get
      - run: dart run build_runner build --delete-conflicting-outputs
      - run: flutter analyze
      - run: flutter test

  build-android:
    needs: [verify, test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true
      - run: flutter pub get
      - run: dart run build_runner build --delete-conflicting-outputs
      # NOTE: debug-signed for now (see android/app/build.gradle.kts).
      # Move to a release keystore via GitHub secrets before any store distribution.
      - run: flutter build apk --release
      - name: Rename artifact
        run: cp build/app/outputs/flutter-apk/app-release.apk "ayutam-${GITHUB_REF_NAME}-android.apk"
      - uses: actions/upload-artifact@v7
        with:
          name: android
          path: ayutam-*.apk
          if-no-files-found: error

  build-linux:
    needs: [verify, test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Install Linux desktop dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev libstdc++-12-dev
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true
      - run: flutter pub get
      - run: dart run build_runner build --delete-conflicting-outputs
      - run: flutter build linux --release
      - name: Package bundle
        run: tar -czf "ayutam-${GITHUB_REF_NAME}-linux-x64.tar.gz" -C build/linux/x64/release/bundle .
      - uses: actions/upload-artifact@v7
        with:
          name: linux
          path: ayutam-*.tar.gz
          if-no-files-found: error

  build-windows:
    needs: [verify, test]
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true
      - run: flutter pub get
      - run: dart run build_runner build --delete-conflicting-outputs
      - run: flutter build windows --release
      - name: Package bundle
        run: Compress-Archive -Path build\windows\x64\runner\Release\* -DestinationPath "ayutam-$env:GITHUB_REF_NAME-windows-x64.zip"
      - uses: actions/upload-artifact@v7
        with:
          name: windows
          path: ayutam-*.zip
          if-no-files-found: error

  release:
    needs: [build-android, build-linux, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Extract CHANGELOG section as release notes
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          awk -v ver="$VERSION" '
            $0 ~ "^## \\[" ver "\\]" { grab = 1; next }
            grab && /^## \[/ { exit }
            grab { print }
          ' CHANGELOG.md > release-notes.md
          echo "--- notes ---"
          cat release-notes.md
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" dist/* \
            --title "Ayutam $GITHUB_REF_NAME" \
            --notes-file release-notes.md \
            --verify-tag
